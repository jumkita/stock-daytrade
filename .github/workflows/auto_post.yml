# 買いシグナル点灯銘柄をバックテスト統計ベースで抽出し、daily_buy_signals.json を更新するワークフロー。
#
# 【タイムゾーン】cron は常に UTC。JST 15:00 に「キューされる」目安は 06:00 UTC（cron: '0 6 * * 1-5'）。
# 【スケジュールの限界】GitHub は負荷状況により開始が数分〜数時間遅れることがある（公式ドキュメント参照）。
# 画面上のコミット時刻は多くの場合「ジョブ完了時刻」であり、必ずしも 15:00 JST ではない。
# 15:00 JST 前後に精密に走らせたい場合は workflow_dispatch / repository_dispatch を外部スケジューラから叩く方法を README に記載。
#
# 【時間がかかる要因と改善】
# 1. 対象銘柄数: 東証全銘柄（数千）だと prefilter + 3年バックテスト + 直近3mo の一括取得が重い
#    → 改善: Actions では USE_NIKKEI225_ONLY=true で日経225銘柄のみに限定（約1/10以下に短縮）
# 2. バックテスト期間: period=3y はデータ量・計算量が大きい
#    → 改善: BACKTEST_PERIOD=1y で約1/3に短縮（必要に応じて 3y に変更可能）
# 3. yfinance の一括取得はチャンク単位のため、銘柄数が多いとリクエスト回数・待ち時間が増える
#    → 上記の銘柄数削減でリクエスト数も減少
# 4. タイムアウト: 15分だと全銘柄時には不足しがち
#    → 改善: timeout-minutes: 20 に延長し、軽量設定（日経225+1y）で 15:00 JST 完了を狙う
#
name: Auto Post Buy Signals to X

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [daily-buy-signals]

# 同一ワークフローの同時実行で push が競合するのを避ける（キュー実行）
concurrency:
  group: auto-post-buy-signals
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      # 軽量化: Actions では日経225銘柄のみ対象にしタイムアウトを防ぐ（ローカルでは未設定で全銘柄）
      USE_NIKKEI225_ONLY: 'true'
      # バックテスト期間短縮（1y で約1/3のデータ量、任意で 3y に戻せる）
      BACKTEST_PERIOD: '1y'
      # 4象限スクリーニング（auto_post 内でバックテスト結果を再ランク・足切り）
      QUADRANT_SCREEN: '1'
      QUADRANT_MODE: 'rank'
      QUADRANT_MIN_SCORE: '0'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 実行開始時刻（JST/UTC・トリガー種別）
        shell: bash
        run: |
          set -euo pipefail
          echo "=== runner now (UTC) ==="
          date -u '+%Y-%m-%d %H:%M:%S %Z'
          echo "=== same instant (Asia/Tokyo) ==="
          TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %Z'
          echo "=== GitHub event ==="
          echo "github.event_name=${{ github.event_name }}"
          echo "github.event.schedule=${{ github.event.schedule }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: リポジトリのファイル確認（logic.py が同じ階層にあるか）
        run: |
          echo "=== カレントディレクトリ ==="
          pwd
          echo "=== ルート直下の .py ファイル ==="
          ls -la *.py 2>/dev/null || true
          echo "=== logic を含むファイル名（大文字小文字区別） ==="
          ls -la logic.py 2>/dev/null || echo "logic.py なし"
          find . -maxdepth 2 -name "*.py" -type f | sort

      - name: Python から logic を import できるか確認
        working-directory: ${{ github.workspace }}
        run: |
          WP="$GITHUB_WORKSPACE"
          echo "WORKSPACE=$WP"
          export PYTHONPATH="$WP"
          python -c "import sys; print('sys.path[0:3]:', sys.path[0:3]); import logic; print('import logic OK')"

      - name: Run auto_post.py
        working-directory: ${{ github.workspace }}
        env:
          DAILY_SIGNALS_JSON_PATH: ${{ github.workspace }}/daily_buy_signals.json
          BULK_CHUNK_SIZE: "50"
        run: |
          WP="$GITHUB_WORKSPACE"
          export PYTHONPATH="$WP"
          python "$WP/auto_post.py"

      - name: ヒストリーファイルの存在確認
        run: |
          echo "=== 現在のディレクトリ ==="
          pwd
          echo "=== daily_buy_signals*.json 一覧 ==="
          ls -la daily_buy_signals*.json || echo "no daily_buy_signals*.json"
          echo "=== git status ==="
          git status --porcelain
          echo "=== git check-ignore ==="
          git check-ignore -v daily_buy_signals.json daily_buy_signals_*.json || true

      - name: 結果をリポジトリにコミット・プッシュ（厳格）
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # glob任せにせず明示的にadd
          git add daily_buy_signals.json
          git add daily_buy_signals_*.json

          echo "=== staged files ==="
          git diff --staged --name-only

          # JST当日分のヒストリーファイルがstagedされていなければ失敗
          TODAY_JST="$(TZ=Asia/Tokyo date +%F)"
          TODAY_FILE="daily_buy_signals_${TODAY_JST}.json"
          if ! git diff --staged --name-only | grep -Fx "$TODAY_FILE" >/dev/null; then
            echo "ERROR: $TODAY_FILE が staged されていません"
            exit 1
          fi

          if git diff --staged --quiet; then
            echo "ERROR: staged changes がありません"
            exit 1
          fi

          git commit -m "chore: Update daily buy signals [automated]"

          # auto_post 実行中に main が進んでいると push が reject されるため、rebase してから push（数回リトライ）
          for attempt in 1 2 3 4 5 6; do
            git fetch origin main
            if ! git pull --rebase origin main; then
              echo "ERROR: git pull --rebase failed (attempt $attempt)"
              exit 1
            fi
            if git push origin main; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "WARN: git push failed (attempt $attempt), sleeping before retry..."
            sleep $((attempt * 20))
          done
          echo "ERROR: git push failed after all retries"
          exit 1
